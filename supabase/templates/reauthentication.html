<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#09090B;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <div style="max-width:480px;margin:0 auto;padding:40px 24px;">
    <a href="{{ .SiteURL }}" style="color:#7B2FF7;font-size:24px;font-weight:700;letter-spacing:-0.5px;text-decoration:none;">nocturn.</a>
    <div style="margin-top:32px;color:#FAFAFA;font-size:15px;line-height:1.6;">
      <h2 style="color:#FAFAFA;font-size:20px;font-weight:600;margin:0 0 16px 0;">Confirm your identity</h2>
      <p style="margin:0 0 16px 0;color:#A1A1AA;">Enter this verification code to continue:</p>
      <div style="background:#1C1C22;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin:16px 0;text-align:center;">
        <p style="color:#7B2FF7;font-size:32px;font-weight:800;letter-spacing:8px;margin:0;">{{ .Token }}</p>
      </div>
      <p style="margin:0 0 16px 0;color:#A1A1AA;">This code expires in 10 minutes. If you didn't request this, please secure your account immediately.</p>
    </div>
    <div style="margin-top:40px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.1);color:#52525B;font-size:12px;">
      <p style="margin:0;">Powered by <a href="https://app.trynocturn.com" style="color:#7B2FF7;text-decoration:none;">nocturn.</a> — AI for music collectives and promoters</p>
    </div>
  </div>
</body>
</html>
